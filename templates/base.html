<!DOCTYPE html>
<html lang="uz">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Savdo Tizimi</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Onest:ital,wght@0,200..900;1,200..900&family=Roboto+Mono:wght@400;500;600;700&display=swap');
            body { font-family: 'Onest', sans-serif; }
            .modern-card {
                background: white;
                border: 1px solid #e5e7eb;
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            }
            .gradient-bg {
                background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            }
            .card-hover {
                transition: all 0.3s ease;
            }
            .card-hover:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            }
            .glass-card {
                background: rgba(255, 255, 255, 0.9);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.3);
            }
        </style>
    </head>
    <body class="bg-gradient-to-br from-slate-50 via-white to-blue-50 min-h-screen">
    <!-- Top Bar -->
    <div class="gradient-bg shadow-md">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-white/20 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zM14 9a1 1 0 00-1 1v6a1 1 0 001 1h2a1 1 0 001-1v-6a1 1 0 00-1-1h-2z"/>
                        </svg>
                    </div>
                    <h1 class="text-white font-bold text-xl tracking-tight">Savdo Tizimi</h1>
                </div>
                <nav class="flex items-center gap-1">
                    <a href="{% url 'dashboard' %}"
                       class="px-5 py-2.5 text-sm font-semibold rounded-lg transition-all duration-200 {%if page == 'dashboard' %}bg-white/20 text-white{% else %}text-white/70 hover:text-white hover:bg-white/10{% endif %}">
                        <span class="hidden sm:inline">Buyurtmalar</span>
                        <svg class="w-5 h-5 sm:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    </a>
                    <a href="{% url 'customer' %}"
                       class="px-5 py-2.5 text-sm font-semibold rounded-lg transition-all duration-200 {%if page == 'customer' %}bg-white/20 text-white{% else %}text-white/70 hover:text-white hover:bg-white/10{% endif %}">
                        <span class="hidden sm:inline">Mijozlar</span>
                        <svg class="w-5 h-5 sm:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    </a>
                    <a href="{% url 'debts' %}"
                       class="px-5 py-2.5 text-sm font-semibold rounded-lg transition-all duration-200 {%if page == 'debt' %}bg-white/20 text-white{% else %}text-white/70 hover:text-white hover:bg-white/10{% endif %}">
                        <span class="hidden sm:inline">Qarzlar</span>
                        <svg class="w-5 h-5 sm:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </a>
                    <a href="{% url 'product' %}"
                       class="px-5 py-2.5 text-sm font-semibold rounded-lg transition-all duration-200 {%if page == 'product' %}bg-white/20 text-white{% else %}text-white/70 hover:text-white hover:bg-white/10{% endif %}">
                        <span class="hidden sm:inline">Mahsulotlar</span>
                        <svg class="w-5 h-5 sm:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                    </a>
                    <a href="{% url 'stats' %}"
                       class="px-5 py-2.5 text-sm font-semibold rounded-lg transition-all duration-200 {%if page == 'stats' %}bg-white/20 text-white{% else %}text-white/70 hover:text-white hover:bg-white/10{% endif %}">
                        <span class="hidden sm:inline">Statistika</span>
                        <svg class="w-5 h-5 sm:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                    </a>
                </nav>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 py-6">
        {% block content %}
        {% endblock %}
    </div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</body>
</html>
